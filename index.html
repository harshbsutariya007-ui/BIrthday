<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mitava</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 3rem;
    animation: fadeIn 3s ease-in-out;
}

p {
    font-size: 1.2rem;
    margin-top: 20px;
    opacity: 0;
    animation: fadeIn 5s ease-in-out forwards;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* glowing effect */
.glow {
    color: #ff4da6;
    text-shadow: 0 0 10px #ff4da6, 0 0 20px #ff4da6;
}

/* floating hearts */
.heart {
    position: absolute;
    color: #ff4da6;
    animation: float 6s infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mp3">
</audio>

<div class="container">
    <h1 class="glow">Happy Birthday Mitava 🎂</h1>
    
    <p>
        Shayad tu aa website expect nai karti...  
        pan hu thodu alag karvu hatu 😊  
        <br><br>
        Tu pehla shu hati... ane have shu che,  
        e badhu change thayu hoy pan  
        ek respect ane care haju pan same che 💫  
        <br><br>
        Aaje taro day che...  
        bas tu khush reh, smile karti reh 😊  
        <br><br>
        Happy Birthday once again ❤️
    </p>
</div>

<script>
// generate floating hearts
for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
