<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mitava</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

/* intro screen */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

#startScreen h1 {
    font-size: 2rem;
    color: #ff4da6;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4da6; }
    to { text-shadow: 0 0 30px #ff4da6; }
}

/* main content */
#main {
    display: none;
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 3rem;
    margin-bottom: 20px;
}

/* typing text */
#text {
    font-size: 1.2rem;
    max-width: 600px;
    margin: auto;
    line-height: 1.6;
}

/* stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: blink 2s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}
</style>
</head>

<body>

<div id="startScreen" onclick="start()">
    <h1>Click to open your surprise ✨</h1>
</div>

<div id="main">
    <h1>Happy Birthday Mitava 🎂</h1>
    <div id="text"></div>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mp3">
</audio>

<script>

// typing message
let msg = `Shayad aa bas ek simple website lage... 
pan aa pachhad thodu sachhu feeling che 😊

Apdi story thodi alag hati...
ane have je che e pan alag che.

Hu bas etlu kahu chu —
tu happy reh, ane life ma je pan kare, mast kar 💫

Happy Birthday Mitava ❤️`;

let i = 0;

function type() {
    if (i < msg.length) {
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}

// start function
function start() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
    type();
}

// stars
for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "vw";
    star.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(star);
}

</script>

</body>
</html>
